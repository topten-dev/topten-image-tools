name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Run tests (headless, no display needed — Fyne test driver is pure software)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev

      - name: Download modules
        run: go mod tidy && go mod download

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # ──────────────────────────────────────────────────────────────────────────
  # Native build on each target OS (CGO required by Fyne)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            archive: topten-image-tools-linux-amd64.tar.gz

          - os: windows-latest
            platform: windows
            archive: topten-image-tools-windows-amd64.zip

          - os: macos-14           # Apple Silicon
            platform: macos-arm64
            archive: topten-image-tools-macos-arm64.zip

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Go toolchain ──────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      # ── Platform-specific system dependencies ─────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev

      # MinGW gcc is already available on windows-latest via MSYS2.
      # Xcode Command Line Tools are pre-installed on macOS runners.

      # ── Module cache & tidy ───────────────────────────────────────────────
      - name: Download modules
        run: go mod tidy && go mod download

      # ── Install fyne CLI (used for packaging) ─────────────────────────────
      - name: Install fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o topten-image-tools \
            .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        # -H=windowsgui hides the console window on launch
        run: |
          $env:CGO_ENABLED = "1"
          go build -ldflags="-s -w -H=windowsgui" -o topten-image-tools.exe .
        shell: pwsh

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: |
          fyne package \
            -os darwin \
            -name "TopTen Image Tools" \
            -appID "dev.topten.image-tools"

      # ── Archive ───────────────────────────────────────────────────────────
      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.archive }}" topten-image-tools

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path topten-image-tools.exe `
            -DestinationPath "${{ matrix.archive }}"

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -r "${{ matrix.archive }}" "TopTen Image Tools.app"

      # ── Upload artifact for release job ───────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Create a GitHub Release and attach all platform archives
  # (only runs on version tags, e.g. v1.0.0)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
